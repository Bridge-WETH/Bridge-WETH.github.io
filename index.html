<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bridge WETH - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Bridge WETH DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://bridge-weth.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #f7f8fa;
  --surface: #ffffff;
  --surface-soft: #f2f4f8;
  --ink: #12151d;
  --muted: #687080;
  --faint: #9aa2b2;
  --line: rgba(18, 21, 29, 0.1);
  --line-strong: rgba(18, 21, 29, 0.16);
  --accent: #627EEA;
  --accent-soft: rgba(98, 126, 234, 0.11);
  --shadow: 0 26px 70px -38px rgba(18, 21, 29, 0.38);
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  min-height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  color: var(--ink);
  background:
    radial-gradient(circle at 50% -12%, rgba(98, 126, 234, 0.13), transparent 38%),
    linear-gradient(180deg, #ffffff 0%, var(--bg) 54%, #f1f3f7 100%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

.topbar {
  flex: none;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 18px clamp(18px, 4vw, 42px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  color: var(--ink);
  font-size: 1rem;
  font-weight: 750;
  letter-spacing: 0;
}

.brand img {
  flex: none;
  border-radius: 50%;
  box-shadow: 0 0 0 1px var(--line);
}

.brand span {
  white-space: nowrap;
}

.nav {
  display: flex;
  align-items: center;
  gap: 28px;
  margin-left: 12px;
}

.nav a {
  color: var(--muted);
  font-size: 0.92rem;
  font-weight: 560;
  transition: color 160ms ease;
}

.nav a:hover {
  color: var(--accent);
}

.spacer {
  flex: 1;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 18px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.7);
  color: var(--ink);
  font-size: 0.9rem;
  font-weight: 700;
  box-shadow: 0 10px 26px -20px rgba(18, 21, 29, 0.42);
  transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
}

.ghost:hover {
  border-color: rgba(98, 126, 234, 0.46);
  color: var(--accent);
  transform: translateY(-1px);
}

.stage {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 14px clamp(18px, 4vw, 42px) 10px;
  text-align: center;
}

.hero {
  max-width: 760px;
}

h1 {
  margin: 0;
  color: var(--ink);
  font-size: clamp(2.6rem, 6vw, 4.55rem);
  line-height: 1.02;
  font-weight: 820;
  letter-spacing: 0;
}

.value {
  max-width: 58ch;
  margin: 17px auto 0;
  color: var(--muted);
  font-size: clamp(1.02rem, 1.7vw, 1.17rem);
  line-height: 1.62;
  font-weight: 450;
}

.value strong {
  color: var(--ink);
  font-weight: 760;
  box-shadow: inset 0 -0.46em 0 var(--accent-soft);
}

.app-card {
  width: min(580px, 100%);
  margin-top: 32px;
  padding: 22px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.99)),
    var(--surface);
  box-shadow: var(--shadow);
}

.route {
  display: flex;
  align-items: stretch;
  gap: 12px;
}

.leg {
  flex: 1 1 0;
  min-width: 0;
  padding: 15px 16px;
  border: 1px solid var(--line);
  border-radius: 15px;
  background: var(--surface-soft);
  text-align: left;
}

.label {
  display: block;
  color: var(--faint);
  font-size: 0.7rem;
  font-weight: 760;
  line-height: 1;
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.chip {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  margin-top: 11px;
  color: var(--ink);
  font-size: 1.12rem;
  font-weight: 820;
  line-height: 1;
}

.chip img {
  width: 30px;
  height: 30px;
  flex: none;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(18, 21, 29, 0.08);
}

.chip span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.switch {
  flex: none;
  align-self: center;
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border: 1px solid rgba(98, 126, 234, 0.28);
  border-radius: 50%;
  background: #ffffff;
  color: var(--accent);
  box-shadow: 0 12px 28px -22px rgba(18, 21, 29, 0.8);
  cursor: pointer;
  transition: background 160ms ease, transform 160ms ease, border-color 160ms ease;
}

.switch:hover {
  border-color: rgba(98, 126, 234, 0.58);
  background: var(--accent-soft);
  transform: translateY(-1px);
}

.switch span {
  display: block;
  font-size: 1.2rem;
  line-height: 1;
}

.primary {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 56px;
  margin-top: 16px;
  border-radius: 15px;
  background: var(--accent);
  color: #ffffff;
  font-size: 1.05rem;
  font-weight: 820;
  box-shadow: 0 18px 34px -24px rgba(98, 126, 234, 0.95);
  transition: background 160ms ease, transform 160ms ease, box-shadow 160ms ease;
}

.primary:hover {
  background: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 22px 38px -24px rgba(98, 126, 234, 0.96);
}

.footer {
  flex: none;
  padding: 18px 24px 24px;
  color: var(--faint);
  font-size: 0.84rem;
  font-weight: 570;
  text-align: center;
}

@media (max-width: 620px) {
  .topbar {
    gap: 12px;
    padding: 14px 16px;
  }

  .nav {
    display: none;
  }

  .brand {
    font-size: 0.96rem;
  }

  .ghost {
    min-height: 38px;
    padding: 0 14px;
    font-size: 0.86rem;
  }

  .stage {
    justify-content: center;
    padding: 8px 16px;
  }

  h1 {
    font-size: clamp(2.45rem, 12vw, 3.1rem);
  }

  .value {
    margin-top: 13px;
    font-size: 1rem;
    line-height: 1.52;
  }

  .app-card {
    margin-top: 24px;
    padding: 16px;
    border-radius: 20px;
  }

  .route {
    flex-direction: column;
    gap: 10px;
  }

  .leg {
    padding: 13px 14px;
  }

  .switch {
    width: 40px;
    height: 40px;
    margin: -1px 0;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .primary {
    min-height: 52px;
    margin-top: 14px;
  }

  .footer {
    padding: 12px 16px 16px;
    font-size: 0.8rem;
  }
}

@media (max-height: 700px) {
  .topbar {
    padding-top: 12px;
    padding-bottom: 10px;
  }

  .stage {
    padding-top: 4px;
    padding-bottom: 4px;
  }

  .app-card {
    margin-top: 20px;
  }

  .footer {
    padding-top: 10px;
    padding-bottom: 12px;
  }
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Bridge WETH</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Bridge WETH</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Bridge WETH &mdash; 2026</footer>
</body>
</html>
